<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Drone Camera</title>

    <link rel="stylesheet" href="/static/camera/camera.css">

</head>

<body>

    <div class="container">

        <h1>Private Cloud Drone</h1>

        <h2>Camera Console</h2>

        <div class="video-container">

            <video
                id="localVideo"
                autoplay
                muted
                playsinline>
            </video>

        </div>

        <div class="controls">

            <button id="startBtn">

                Start Camera

            </button>

            <button id="stopBtn">

                Stop Camera

            </button>

        </div>

        <div class="status">

            <h3>Status</h3>

            <p id="statusText">

                Camera not started.

            </p>

        </div>

    </div>

    <script type="module"
        src="/static/camera/camera.js">
    </script>

</body>

</html>
