<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Drone Dashboard</title>

    <link rel="stylesheet" href="/static/dashboard/dashboard.css">

</head>

<body>

    <div class="container">

        <h1>Private Cloud Drone</h1>

        <h2>Monitoring Dashboard</h2>

        <!-- Live Video -->
        <div class="video-container">

            <video
                id="remoteVideo"
                autoplay
                playsinline>
            </video>

        </div>

        <!-- Recording Controls -->
        <div class="recording-controls">

            <button id="startRecording">
                Start Recording
            </button>

            <button
                id="stopRecording"
                disabled>
                Stop Recording
            </button>

        </div>

        <!-- Navigation -->
        <div class="navigation">

            <a
                id="viewRecordings"
                href="/recordings">

                📁 View Recordings

            </a>

        </div>

        <hr>

        <!-- Status -->
        <div class="status">

            <h3>Status</h3>

            <p id="statusText">

                Waiting for camera...

            </p>

        </div>

    </div>

    <script
        type="module"
        src="/static/dashboard/dashboard.js">
    </script>

</body>

</html>
