services:

  backend:
    build:
      context: ./backend
    container_name: drone_backend

    restart: unless-stopped
    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./videos:/app/videos
      - ./recordings:/app/recordings
      - ./logs:/app/logs

    depends_on:
      - postgres

    networks:
      - drone_network

  postgres:
    image: postgres:16

    container_name: drone_postgres

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./database:/var/lib/postgresql/data

    networks:
      - drone_network

  nginx:
    image: nginx:latest

    container_name: drone_nginx

    restart: unless-stopped

    ports:
      - "443:443"
      - "80:80"

    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./certificates:/etc/nginx/certs

    depends_on:
      - backend

    networks:
      - drone_network

networks:
  drone_network:

